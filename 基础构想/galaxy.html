<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Penguin · Galaxy</title>
<style>
  :root { color-scheme: dark; }
  html, body { margin: 0; height: 100%; background: #05060d; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
    color: #cfd3e2;
  }
  #app { position: fixed; inset: 0; }

  /* 中心 name */
  .center {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%);
    z-index: 3; pointer-events: none; text-align: center;
    transition: opacity 0.5s ease;
  }
  .center.hidden { opacity: 0; }
  .center .name {
    font-size: clamp(56px, 9vw, 132px);
    font-weight: 200; letter-spacing: 0.04em;
    background: linear-gradient(180deg, #ffffff 0%, #c8cfff 55%, #6a78c8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 60px rgba(138, 123, 255, 0.35);
    line-height: 1;
  }
  .center .tag {
    margin-top: 14px;
    font-size: 11px; letter-spacing: 0.45em; text-transform: uppercase;
    color: rgba(207, 211, 226, 0.55);
  }

  /* 圆环上的板块标签 */
  .label {
    pointer-events: auto; cursor: pointer;
    text-decoration: none; display: inline-block;
  }
  .label-inner {
    display: inline-block; user-select: none;
    color: #e8ecff;
    font-size: 13px; letter-spacing: 0.32em; text-transform: uppercase;
    padding: 8px 14px;
    background: rgba(12, 14, 26, 0.45);
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 999px; white-space: nowrap;
    transform-origin: center center;
    transition: transform 0.25s ease, background 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    box-shadow: 0 14px 40px -22px rgba(0, 0, 0, 0.9);
  }
  .label .cn { font-weight: 500; }
  .label .en { margin-left: 8px; font-size: 10px; opacity: 0.55; letter-spacing: 0.28em; }
  .label:hover .label-inner {
    transform: scale(1.08);
    background: linear-gradient(135deg, rgba(138,123,255,0.35), rgba(255,123,184,0.22));
    border-color: rgba(255,255,255,0.25);
    box-shadow: 0 18px 50px -18px rgba(138,123,255,0.55);
  }

  /* 子星系：主序星名字 */
  .star-name {
    pointer-events: none; user-select: none;
    text-align: center; white-space: nowrap;
    transform: translateY(-2px);
  }
  .star-name .cn {
    display: block;
    font-size: clamp(36px, 5.6vw, 76px);
    font-weight: 200; letter-spacing: 0.06em;
    background: linear-gradient(180deg, #ffffff 0%, #ffd9b0 55%, #ff8a4a 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    text-shadow: 0 0 50px rgba(255, 160, 90, 0.55);
    line-height: 1;
  }
  .star-name .en {
    margin-top: 8px;
    font-size: 11px; letter-spacing: 0.4em; text-transform: uppercase;
    color: rgba(255, 220, 200, 0.6);
  }

  /* 子星系：行星标签 */
  .planet {
    pointer-events: auto; cursor: pointer;
    user-select: none; text-decoration: none;
    color: #e8ecff;
    font-size: 12px; letter-spacing: 0.18em;
    padding: 5px 11px;
    background: rgba(12, 14, 26, 0.55);
    backdrop-filter: blur(8px) saturate(140%);
    -webkit-backdrop-filter: blur(8px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px; white-space: nowrap;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    box-shadow: 0 10px 28px -16px rgba(0,0,0,0.9);
  }
  .planet:hover {
    color: #fff;
    background: linear-gradient(135deg, rgba(255,180,120,0.35), rgba(255,123,184,0.2));
    border-color: rgba(255,200,160,0.4);
  }

  /* 返回按钮 */
  .back {
    position: fixed; left: 22px; top: 22px; z-index: 4;
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 14px 9px 12px;
    background: rgba(12, 14, 26, 0.55);
    backdrop-filter: blur(12px) saturate(140%);
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    color: #e8ecff; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease, background 0.2s ease, transform 0.2s ease;
  }
  .back.show { opacity: 1; pointer-events: auto; }
  .back:hover { background: rgba(30, 34, 56, 0.7); transform: translateY(-1px); }
  .back svg { width: 14px; height: 14px; }

  /* 子星系左右切换 */
  .nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    z-index: 4; width: 46px; height: 46px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(12, 14, 26, 0.55);
    backdrop-filter: blur(12px) saturate(140%);
    -webkit-backdrop-filter: blur(12px) saturate(140%);
    border: 1px solid rgba(255, 255, 255, 0.12);
    color: #e8ecff; cursor: pointer;
    opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease, background 0.2s ease, transform 0.2s ease;
    box-shadow: 0 14px 36px -22px rgba(0,0,0,0.9);
  }
  .nav.show { opacity: 1; pointer-events: auto; }
  .nav:hover { background: rgba(30, 34, 56, 0.75); }
  .nav.prev { left: 22px; }
  .nav.next { right: 22px; }
  .nav.prev:hover { transform: translateY(-50%) translateX(-2px); }
  .nav.next:hover { transform: translateY(-50%) translateX(2px); }
  .nav svg { width: 18px; height: 18px; }
  .nav-label {
    position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    margin-top: 8px; font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase;
    color: rgba(207,211,226,0.55); white-space: nowrap; pointer-events: none;
  }

  .hud {
    position: fixed; left: 22px; bottom: 20px; z-index: 2;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(207, 211, 226, 0.45); pointer-events: none;
    transition: opacity 0.4s ease;
  }
  .hud.hidden { opacity: 0; }
  .hud b { color: #e8ecff; font-weight: 600; letter-spacing: 0.28em; }

  /* 黑场过渡 */
  .fader {
    position: fixed; inset: 0; z-index: 10; background: #05060d;
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .fader.on { opacity: 1; pointer-events: auto; }
</style>
</head>
<body>
<div id="app"></div>

<div class="center" id="center">
  <div class="name">name</div>
  <div class="tag">A Galaxy of Ideas</div>
</div>

<button class="back" id="back" type="button">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  Back
</button>

<button class="nav prev" id="navPrev" type="button" aria-label="上一个板块">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  <span class="nav-label" id="prevLabel"></span>
</button>
<button class="nav next" id="navNext" type="button" aria-label="下一个板块">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  <span class="nav-label" id="nextLabel"></span>
</button>

<div class="hud" id="hud"><b>GALAXY</b> · drag to orbit · scroll to zoom · click a section to enter</div>

<div class="fader" id="fader"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const app = document.getElementById('app');
const centerEl = document.getElementById('center');
const hudEl = document.getElementById('hud');
const backEl = document.getElementById('back');
const faderEl = document.getElementById('fader');
const navPrevEl = document.getElementById('navPrev');
const navNextEl = document.getElementById('navNext');
const prevLabelEl = document.getElementById('prevLabel');
const nextLabelEl = document.getElementById('nextLabel');

// -- scene / camera / renderer --------------------------------------------
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05060d, 0.018);

const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
const GALAXY_CAM = new THREE.Vector3(0, 3.5, 7.5);
const SYSTEM_CAM = new THREE.Vector3(0, 1.6, 6.0);
camera.position.copy(GALAXY_CAM);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
app.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(innerWidth, innerHeight);
labelRenderer.domElement.style.position = 'fixed';
labelRenderer.domElement.style.inset = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
labelRenderer.domElement.style.zIndex = '2';
document.body.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 4;
controls.maxDistance = 16;
controls.maxPolarAngle = Math.PI * 0.49;
controls.autoRotate = false;

// -- 工具：tween ----------------------------------------------------------
function tween({ dur = 0.6, ease = (t)=> t<.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2, onUpdate, onDone }) {
  const t0 = performance.now();
  function loop() {
    const t = Math.min(1, (performance.now() - t0) / (dur * 1000));
    onUpdate(ease(t), t);
    if (t < 1) requestAnimationFrame(loop);
    else onDone && onDone();
  }
  loop();
}

// -- background starfield --------------------------------------------------
function makeStarfield(n = 4500, r = 80) {
  const g = new THREE.BufferGeometry();
  const pos = new Float32Array(n * 3);
  const col = new Float32Array(n * 3);
  for (let i = 0; i < n; i++) {
    const u = Math.random(), v = Math.random();
    const theta = 2 * Math.PI * u, phi = Math.acos(2 * v - 1);
    const rr = r * (0.55 + Math.random() * 0.45);
    pos[i*3]   = rr * Math.sin(phi) * Math.cos(theta);
    pos[i*3+1] = rr * Math.sin(phi) * Math.sin(theta);
    pos[i*3+2] = rr * Math.cos(phi);
    const t = Math.random();
    col[i*3]   = 0.7 + t*0.3;
    col[i*3+1] = 0.75 + t*0.2;
    col[i*3+2] = 0.95;
  }
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  g.setAttribute('color', new THREE.BufferAttribute(col, 3));
  const m = new THREE.PointsMaterial({
    size: 0.06, sizeAttenuation: true, vertexColors: true,
    transparent: true, opacity: 0.85, depthWrite: false,
    blending: THREE.AdditiveBlending,
  });
  return new THREE.Points(g, m);
}
scene.add(makeStarfield());

// =========================================================================
// 1) 总览：环形星系
// =========================================================================
const galaxyGroup = new THREE.Group();
scene.add(galaxyGroup);

const RING = {
  count: 90000,
  radius: 3.8,
  thickness: 1.2,
  height: 0.22,
  waveCount: 3,
  waveAmp: 0.22,
  insideColor: '#ffb37a',
  outsideColor: '#7a8cff',
};

function buildRing() {
  const { count, radius, thickness, height } = RING;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const scales = new Float32Array(count);
  const seeds = new Float32Array(count);

  const cIn = new THREE.Color(RING.insideColor);
  const cOut = new THREE.Color(RING.outsideColor);
  const cMid = new THREE.Color('#c89bff');

  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    const u1 = Math.max(1e-6, Math.random()), u2 = Math.random();
    const gauss = Math.sqrt(-2 * Math.log(u1)) * Math.cos(2 * Math.PI * u2);
    const r = radius + gauss * thickness * 0.5;
    const angle = Math.random() * Math.PI * 2;
    const u3 = Math.max(1e-6, Math.random()), u4 = Math.random();
    const gh = Math.sqrt(-2 * Math.log(u3)) * Math.cos(2 * Math.PI * u4);
    const radialFalloff = 1 - Math.min(1, Math.abs(r - radius) / thickness);
    const yNoise = gh * height * 0.5 * radialFalloff;
    const yWave  = Math.sin(angle * RING.waveCount) * RING.waveAmp * (0.4 + 0.6 * radialFalloff);
    const y = yNoise + yWave;

    positions[i3]   = Math.cos(angle) * r;
    positions[i3+1] = y;
    positions[i3+2] = Math.sin(angle) * r;

    const d = (r - (radius - thickness)) / (thickness * 2);
    const t = Math.min(1, Math.max(0, d));
    const col = t < 0.5 ? cIn.clone().lerp(cMid, t * 2) : cMid.clone().lerp(cOut, (t - 0.5) * 2);
    colors[i3]   = col.r;
    colors[i3+1] = col.g;
    colors[i3+2] = col.b;

    scales[i] = 0.3 + Math.random() * 1.5;
    seeds[i]  = Math.random() * 1000;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('aScale',   new THREE.BufferAttribute(scales, 1));
  geo.setAttribute('aSeed',    new THREE.BufferAttribute(seeds, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uSize: { value: 0.022 * renderer.getPixelRatio() * 800 },
      uOpacity: { value: 1 },
      uHoverSection: { value: -1 },
      uHoverStrength: { value: 0 },
      uSectionCount: { value: 8 }, // 后面会以 SECTIONS.length 覆盖
    },
    vertexShader: `
      uniform float uTime; uniform float uSize;
      uniform float uHoverSection; uniform float uHoverStrength; uniform float uSectionCount;
      attribute float aScale; attribute float aSeed;
      varying vec3 vColor; varying float vTwinkle; varying float vHilite;
      void main() {
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mv;
        gl_PointSize = uSize * aScale / -mv.z;
        vColor = color;
        vTwinkle = 0.6 + 0.4 * sin(uTime * 1.4 + aSeed);

        float vh = 1.0;
        if (uHoverSection >= 0.0 && uHoverStrength > 0.001) {
          float ang = atan(position.z, position.x);
          float hoverAng = (uHoverSection / uSectionCount) * 6.2831853 - 1.5707963;
          float d = mod(ang - hoverAng + 3.1415927, 6.2831853) - 3.1415927;
          float halfSector = 3.1415927 / uSectionCount;
          float norm = abs(d) / halfSector;             // 0 = 板块中心，1 = 扇区边界
          float k = 1.0 - smoothstep(0.0, 3.0, norm);    // 角向平滑衰减
          float lo = mix(1.0, 0.32, uHoverStrength);     // 距离越近，对比越强
          float hi = mix(1.0, 1.55, uHoverStrength);
          vh = mix(lo, hi, k);
        }
        vHilite = vh;
      }`,
    fragmentShader: `
      varying vec3 vColor; varying float vTwinkle; varying float vHilite;
      uniform float uOpacity;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        float core = exp(-d * 14.0);
        float halo = exp(-d * 4.0) * 0.35;
        float alpha = (core + halo) * vTwinkle * uOpacity * vHilite;
        if (alpha < 0.01) discard;
        gl_FragColor = vec4(vColor * (1.2 + core * 0.8) * vHilite, alpha);
      }`,
    transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, vertexColors: true,
  });

  return new THREE.Points(geo, mat);
}
const ring = buildRing();
galaxyGroup.add(ring);

// 圆环薄盘辉光
const discMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 }, uOpacity: { value: 1 } },
  transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  vertexShader: `varying vec3 vPos; void main(){ vPos=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader: `
    varying vec3 vPos; uniform float uTime; uniform float uOpacity;
    void main(){
      float r = length(vPos.xz);
      float ang = atan(vPos.z, vPos.x);
      float band = exp(-pow((r - ${RING.radius.toFixed(2)})/0.9, 2.0));
      float swirl = 0.5 + 0.5 * sin(ang * 6.0 + uTime * 0.3);
      vec3 col = mix(vec3(1.0,0.6,0.4), vec3(0.55,0.6,1.0),
        smoothstep(${(RING.radius-RING.thickness).toFixed(2)}, ${(RING.radius+RING.thickness).toFixed(2)}, r));
      float a = band * (0.18 + swirl * 0.08) * uOpacity;
      gl_FragColor = vec4(col * a * 1.4, a);
    }`,
});
const discGeo = new THREE.RingGeometry(RING.radius - RING.thickness, RING.radius + RING.thickness, 256, 6);
{
  const dpos = discGeo.attributes.position;
  for (let i = 0; i < dpos.count; i++) {
    const x = dpos.getX(i), y = dpos.getY(i);
    const ang = Math.atan2(y, x);
    const r = Math.sqrt(x*x + y*y);
    const radialFalloff = 1 - Math.min(1, Math.abs(r - RING.radius) / RING.thickness);
    const w = Math.sin(ang * RING.waveCount) * RING.waveAmp * (0.4 + 0.6 * radialFalloff);
    // 几何体在 XY 平面，rotation.x = -π/2 时 z_local 映射到 -y_world，故取负号
    dpos.setZ(i, -w);
  }
  dpos.needsUpdate = true;
  discGeo.computeVertexNormals();
}
const disc = new THREE.Mesh(discGeo, discMat);
disc.rotation.x = -Math.PI / 2;
galaxyGroup.add(disc);

// 板块定义 + 子项目（行星）
const SECTIONS = [
  { cn: '首页', en: 'Home',     hue: 0.62, items: ['简介', '动态', '关注', '留言'] },
  { cn: '项目', en: 'Projects', hue: 0.05, items: ['Penguin Blog', 'Galaxy UI', 'Doc Engine', 'Lark Bot', 'Note Sync'] },
  { cn: '文档', en: 'Docs',     hue: 0.55, items: ['入门指南', 'API 参考', '部署手册', '常见问题', '更新日志'] },
  { cn: '博客', en: 'Blog',     hue: 0.85, items: ['最近的写作', '工程随笔', '产品思考', '读书笔记'] },
  { cn: '笔记', en: 'Notes',    hue: 0.42, items: ['Three.js', 'Shader', 'Rust', '系统设计', '碎片想法'] },
  { cn: '开源', en: 'Open',     hue: 0.13, items: ['仓库列表', '贡献记录', 'Star 推荐', 'Issue 看板'] },
  { cn: '关于', en: 'About',    hue: 0.72, items: ['履历', '技能', '兴趣', '时间线'] },
  { cn: '联系', en: 'Contact',  hue: 0.95, items: ['邮箱', 'GitHub', 'Twitter', 'RSS'] },
];

const sectionLabels = [];
const anchorMats = [];
ring.material.uniforms.uSectionCount.value = SECTIONS.length;
SECTIONS.forEach((s, i) => {
  const angle = (i / SECTIONS.length) * Math.PI * 2 - Math.PI / 2;
  const r = RING.radius + 0.4;
  const x = Math.cos(angle) * r;
  const z = Math.sin(angle) * r;
  // 让锚点 / 标签骑在星环波浪上，公式与粒子环 / disc 保持一致
  const radialFalloff = 1 - Math.min(1, Math.abs(r - RING.radius) / RING.thickness);
  const yWave = Math.sin(angle * RING.waveCount) * RING.waveAmp * (0.4 + 0.6 * radialFalloff);

  const el = document.createElement('a');
  el.className = 'label';
  el.href = 'javascript:void(0)';
  el.dataset.idx = i;
  el.innerHTML = `<span class="label-inner"><span class="cn">${s.cn}</span><span class="en">${s.en}</span></span>`;
  el.addEventListener('click', (e) => { e.preventDefault(); enterSystem(i); });

  const obj = new CSS2DObject(el);
  obj.position.set(x, yWave + 0.05, z);
  obj.center.set(0.5, 0.5);
  galaxyGroup.add(obj);
  sectionLabels.push({ obj, el });

  const anchorMat = new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(s.hue, 0.7, 0.7), transparent: true, opacity: 0.9 });
  const anchor = new THREE.Mesh(new THREE.SphereGeometry(0.12, 12, 12), anchorMat);
  anchor.position.set(x, yWave, z);
  galaxyGroup.add(anchor);
  anchorMats.push(anchorMat);
});

// =========================================================================
// 2) 子星系（点击板块后构建）
// =========================================================================
const systemGroup = new THREE.Group();
systemGroup.visible = false;
scene.add(systemGroup);

let activeSystem = null; // { star, planets:[{mesh, label, angle, speed, radius, tilt}], disposers:[] }

function buildSystem(section) {
  // 主序星：发光球
  const starGeo = new THREE.SphereGeometry(0.4, 48, 48);
  const starMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 }, uColor: { value: new THREE.Color().setHSL(section.hue, 0.85, 0.62) } },
    vertexShader: `varying vec3 vN; void main(){ vN=normalize(normalMatrix*normal); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader: `
      varying vec3 vN; uniform vec3 uColor; uniform float uTime;
      void main(){
        float fres = pow(1.0 - max(0.0, vN.z), 2.0);
        float pulse = 0.85 + 0.15 * sin(uTime * 1.4);
        vec3 hot = mix(uColor, vec3(1.0), 0.6);
        gl_FragColor = vec4(mix(uColor, hot, fres) * (1.2 + fres) * pulse, 1.0);
      }`,
  });
  const star = new THREE.Mesh(starGeo, starMat);
  systemGroup.add(star);

  // 主序星辉光
  const haloMat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
    uniforms: { uColor: { value: new THREE.Color().setHSL(section.hue, 0.85, 0.55) } },
    vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
    fragmentShader: `
      varying vec2 vUv; uniform vec3 uColor;
      void main(){
        vec2 p=vUv-0.5; float d=length(p);
        float a = smoothstep(0.5, 0.0, d);
        gl_FragColor = vec4(uColor * a * 1.6, a * 0.7);
      }`,
  });
  const halo = new THREE.Mesh(new THREE.PlaneGeometry(2.2, 2.2), haloMat);
  halo.userData.isHalo = true;
  systemGroup.add(halo);

  // 中心星名字（贴在 star 上）
  const nameEl = document.createElement('div');
  nameEl.className = 'star-name';
  nameEl.innerHTML = `<span class="cn">${section.cn}</span><span class="en">${section.en}</span>`;
  const nameObj = new CSS2DObject(nameEl);
  nameObj.position.set(0, 0, 0);
  systemGroup.add(nameObj);

  // 行星
  const planets = [];
  const N = section.items.length;
  section.items.forEach((item, i) => {
    const orbitR = 1.6 + i * 0.55;
    const baseAngle = (i / N) * Math.PI * 2;
    const speed = 0.18 - i * 0.018;
    // 基准让 orbitGroup 的局部 XY 平面贴在黄道（场景 XZ 平面）上，
    // 再叠正负随机倾角 / 进动，让各行星轨道有明显的高低起伏
    const signX = (i % 2 === 0 ? 1 : -1);
    const signZ = ((i + 1) % 2 === 0 ? 1 : -1);
    const tiltX = signX * (0.12 + (i % 3) * 0.06);
    const tiltZ = signZ * (0.08 + ((i * 47) % 5) * 0.025);
    const yaw   = (i / N) * Math.PI * 2 * 0.2;

    const orbitGroup = new THREE.Group();
    orbitGroup.rotation.set(-Math.PI / 2 + tiltX, yaw, tiltZ);
    systemGroup.add(orbitGroup);

    // 轨道线（默认在 XY 平面，正好就是轨道平面）
    const ringG = new THREE.RingGeometry(orbitR - 0.005, orbitR + 0.005, 96);
    const ringM = new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.08, side: THREE.DoubleSide, depthWrite: false,
    });
    orbitGroup.add(new THREE.Mesh(ringG, ringM));

    // 行星本体：自带光照 / 噪声纹理 / 大气边缘辉光的 ShaderMaterial
    const baseHue = (section.hue + i * 0.07) % 1;
    const colA = new THREE.Color().setHSL(baseHue, 0.55, 0.55);
    const colB = new THREE.Color().setHSL((baseHue + 0.08) % 1, 0.7, 0.78);
    const pMat = new THREE.ShaderMaterial({
      uniforms: {
        uColorA:  { value: colA },
        uColorB:  { value: colB },
        uSeed:    { value: i * 13.37 + 0.7 },
        uStarPos: { value: new THREE.Vector3() },
      },
      vertexShader: `
        varying vec3 vNormalW;
        varying vec3 vWorldPos;
        varying vec3 vLocalPos;
        void main(){
          vec4 wp = modelMatrix * vec4(position, 1.0);
          vWorldPos = wp.xyz;
          vNormalW  = normalize(mat3(modelMatrix) * normal);
          vLocalPos = position;
          gl_Position = projectionMatrix * viewMatrix * wp;
        }`,
      fragmentShader: `
        uniform vec3 uColorA; uniform vec3 uColorB; uniform float uSeed; uniform vec3 uStarPos;
        varying vec3 vNormalW; varying vec3 vWorldPos; varying vec3 vLocalPos;
        float hash(vec3 p){ return fract(sin(dot(p, vec3(17.1,113.5,71.7))) * 43758.5453); }
        float vnoise(vec3 p){
          vec3 i=floor(p), f=fract(p); f=f*f*(3.0-2.0*f);
          return mix(
            mix(mix(hash(i+vec3(0,0,0)),hash(i+vec3(1,0,0)),f.x),
                mix(hash(i+vec3(0,1,0)),hash(i+vec3(1,1,0)),f.x),f.y),
            mix(mix(hash(i+vec3(0,0,1)),hash(i+vec3(1,0,1)),f.x),
                mix(hash(i+vec3(0,1,1)),hash(i+vec3(1,1,1)),f.x),f.y), f.z);
        }
        float fbm(vec3 p){ float v=0.0,a=0.5; for(int k=0;k<4;k++){ v+=a*vnoise(p); p*=2.03; a*=0.5; } return v; }
        void main(){
          vec3 N = normalize(vNormalW);
          vec3 L = normalize(uStarPos - vWorldPos);       // 朝向中心恒星
          vec3 V = normalize(cameraPosition - vWorldPos);
          float n = fbm(vLocalPos * 4.0 + uSeed);
          float band = 0.5 + 0.5 * sin(vLocalPos.y * 9.0 + n * 3.0 + uSeed);
          vec3 surf = mix(uColorA, uColorB, smoothstep(0.32, 0.72, mix(n, band, 0.35)));
          float diff = max(dot(N, L), 0.0);
          float ambient = 0.22;
          float spec = pow(max(dot(reflect(-L, N), V), 0.0), 28.0) * 0.35;
          float fres = pow(1.0 - max(dot(N, V), 0.0), 3.0);
          vec3 atmo = mix(uColorB, vec3(1.0), 0.35) * fres * 0.7;
          vec3 color = surf * (ambient + diff * 1.05) + spec + atmo;
          gl_FragColor = vec4(color, 1.0);
        }`,
    });
    const pSize = 0.09 + (i % 4) * 0.022;
    const planet = new THREE.Mesh(new THREE.SphereGeometry(pSize, 36, 36), pMat);
    // 自转轴随机倾斜 + 公转（rotation.order=ZYX 让倾角先施加，再绕本地 Y 自转）
    planet.rotation.order = 'ZYX';
    planet.rotation.z = ((i * 0.37) % 1.0) * 0.6 - 0.3;
    orbitGroup.add(planet);

    // 给约 1/3 的行星加一个土星式光环
    if (i % 3 === 1) {
      const rInner = pSize * 1.6;
      const rOuter = pSize * 2.6;
      const ringGeo = new THREE.RingGeometry(rInner, rOuter, 80);
      // 给 ring 几何体重做 uv，让 fragment 知道径向位置
      const uv = ringGeo.attributes.uv;
      const pos = ringGeo.attributes.position;
      for (let k = 0; k < pos.count; k++) {
        const x = pos.getX(k), y = pos.getY(k);
        const rr = Math.sqrt(x*x + y*y);
        const t = (rr - rInner) / (rOuter - rInner);
        uv.setXY(k, t, 0.5);
      }
      uv.needsUpdate = true;
      const ringMat = new THREE.ShaderMaterial({
        transparent: true, depthWrite: false, side: THREE.DoubleSide,
        uniforms: { uColor: { value: colB.clone() } },
        vertexShader: `varying vec2 vUv; void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);} `,
        fragmentShader: `
          varying vec2 vUv; uniform vec3 uColor;
          float h(float x){ return fract(sin(x*73.13)*43758.5); }
          void main(){
            float t = vUv.x;
            float bands = 0.6 + 0.4 * sin(t * 38.0) * sin(t * 11.0 + 1.3);
            float gap = smoothstep(0.0,0.04,t) * smoothstep(1.0,0.96,t);
            float alpha = bands * gap * 0.55;
            gl_FragColor = vec4(uColor * (0.8 + bands*0.4), alpha);
          }`,
      });
      const ringMesh = new THREE.Mesh(ringGeo, ringMat);
      // 光环平面相对行星赤道做点倾斜
      ringMesh.rotation.x = Math.PI / 2 + (i * 0.21);
      ringMesh.rotation.y = (i * 0.13);
      planet.add(ringMesh);
    }

    // 行星标签
    const pEl = document.createElement('a');
    pEl.className = 'planet';
    pEl.href = 'javascript:void(0)';
    pEl.textContent = item;
    const pLabel = new CSS2DObject(pEl);
    pLabel.position.set(0, 0.18, 0);
    pLabel.center.set(0.5, 0.5);
    planet.add(pLabel);

    const spin = 0.25 + (i % 5) * 0.08;
    planets.push({ mesh: planet, material: pMat, angle: baseAngle, speed, radius: orbitR, spin });
  });

  activeSystem = { star, halo, nameObj, planets, materials: [starMat, haloMat] };
}

function disposeSystem() {
  if (!activeSystem) return;
  // 移除所有 children 并 dispose 几何/材质
  while (systemGroup.children.length) {
    const c = systemGroup.children[0];
    systemGroup.remove(c);
    c.traverse?.((o) => {
      o.geometry?.dispose?.();
      if (o.material) {
        Array.isArray(o.material) ? o.material.forEach(m => m.dispose()) : o.material.dispose();
      }
      if (o instanceof CSS2DObject && o.element?.parentNode) o.element.parentNode.removeChild(o.element);
    });
    if (c instanceof CSS2DObject && c.element?.parentNode) c.element.parentNode.removeChild(c.element);
  }
  activeSystem = null;
}

// =========================================================================
// 3) 进入 / 退出动画
// =========================================================================
// 鼠标到最近板块标签的距离驱动的 hover 强度（在 tick 里平滑跟随）
let targetHoverSection = -1;
let targetHoverStrength = 0;
const _hoverRay = new THREE.Raycaster();
const _hoverNDC = new THREE.Vector2();
const _galacticPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
const _hoverHit = new THREE.Vector3();
const RING_INNER = (RING.radius - RING.thickness) * 0.5;
addEventListener('mousemove', (e) => {
  if (mode !== 'galaxy') { targetHoverStrength = 0; return; }

  // 死区：光标落在星系平面上、世界半径小于内径时不触发高亮
  _hoverNDC.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  _hoverRay.setFromCamera(_hoverNDC, camera);
  if (_hoverRay.ray.intersectPlane(_galacticPlane, _hoverHit)) {
    const worldR = Math.hypot(_hoverHit.x, _hoverHit.z);
    if (worldR < RING_INNER) { targetHoverStrength = 0; return; }
  }

  let nearest = -1, nearestD = Infinity;
  sectionLabels.forEach(({ el }, i) => {
    const r = el.getBoundingClientRect();
    if (!r.width) return;
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    const d = Math.hypot(e.clientX - cx, e.clientY - cy);
    if (d < nearestD) { nearestD = d; nearest = i; }
  });
  targetHoverSection = nearest;
  // 60px 内强度最大、420px 外回到 0
  targetHoverStrength = Math.max(0, Math.min(1, 1 - (nearestD - 60) / 360));
});
document.addEventListener('mouseleave', () => { targetHoverStrength = 0; });

function setGalaxyOpacity(o) {
  ring.material.uniforms.uOpacity.value = o;
  disc.material.uniforms.uOpacity.value = o;
  for (const m of anchorMats) m.opacity = 0.9 * o;
}

let mode = 'galaxy'; // 'galaxy' | 'system'
let transitioning = false;
let currentIdx = -1;

function updateNavLabels() {
  const N = SECTIONS.length;
  const prev = SECTIONS[(currentIdx - 1 + N) % N];
  const next = SECTIONS[(currentIdx + 1) % N];
  prevLabelEl.textContent = prev.cn;
  nextLabelEl.textContent = next.cn;
}

function enterSystem(idx) {
  if (transitioning || mode !== 'galaxy') return;
  transitioning = true;
  controls.enabled = false;

  const section = SECTIONS[idx];
  const anchor = sectionLabels[idx].obj.position.clone();
  // 子星系在锚点处就地生成，避免黑屏切换
  buildSystem(section);
  systemGroup.position.copy(anchor);
  systemGroup.scale.setScalar(0.001);
  systemGroup.visible = true;
  ring.material.uniforms.uHoverSection.value = -1;
  ring.material.uniforms.uHoverStrength.value = 0;
  targetHoverSection = -1;
  targetHoverStrength = 0;

  centerEl.classList.add('hidden');
  hudEl.classList.add('hidden');
  // 板块标签平滑淡出，完成后再被 galaxyGroup 隐藏
  sectionLabels.forEach(({ el }) => {
    el.style.transition = 'opacity 0.6s ease';
    el.style.opacity = '0';
    el.style.pointerEvents = 'none';
  });

  controls.minDistance = 1.5;
  controls.maxDistance = 18;

  const camFrom = camera.position.clone();
  const camTo = systemCamPosFor(anchor);
  const tFrom = controls.target.clone();
  const tTo = anchor.clone();

  tween({
    dur: 1.1,
    onUpdate: (e) => {
      camera.position.lerpVectors(camFrom, camTo, e);
      controls.target.lerpVectors(tFrom, tTo, e);
      // 在飞行后半段把子星系从极小缩放到 1，配合摄像机抵达
      const s = e < 0.35 ? 0 : (e - 0.35) / 0.65;
      const scale = THREE.MathUtils.lerp(0.001, 1, Math.min(1, s));
      systemGroup.scale.setScalar(scale);
      // 星系背景同步渐隐
      setGalaxyOpacity(1 - Math.min(1, e / 0.85));
    },
    onDone: () => {
      // 飞行结束后再隐藏星系总览，避免突兀闪现
      setGalaxyOpacity(0);
      galaxyGroup.visible = false;
      currentIdx = idx;
      mode = 'system';
      updateNavLabels();
      backEl.classList.add('show');
      navPrevEl.classList.add('show');
      navNextEl.classList.add('show');
      controls.enabled = true;
      transitioning = false;
    },
  });
}

function switchSystem(delta) {
  if (transitioning || mode !== 'system') return;
  const N = SECTIONS.length;
  const next = (currentIdx + delta + N) % N;
  transitioning = true;
  controls.enabled = false;

  const startScale = systemGroup.scale.x;
  const camFromShrink = camera.position.clone();
  const tFromShrink = controls.target.clone();
  const oldAnchor = systemGroup.position.clone();

  // 第一段：当前子星系收缩、镜头略微拉远
  const camPullback = camFromShrink.clone().add(
    camFromShrink.clone().sub(oldAnchor).normalize().multiplyScalar(1.2)
  );
  tween({
    dur: 0.5,
    onUpdate: (e) => {
      systemGroup.scale.setScalar(THREE.MathUtils.lerp(startScale, 0.001, e));
      camera.position.lerpVectors(camFromShrink, camPullback, e);
      controls.target.lerpVectors(tFromShrink, oldAnchor, e);
    },
    onDone: () => {
      disposeSystem();
      const newAnchor = sectionLabels[next].obj.position.clone();
      buildSystem(SECTIONS[next]);
      systemGroup.position.copy(newAnchor);
      systemGroup.scale.setScalar(0.001);
      systemGroup.visible = true;

      currentIdx = next;
      updateNavLabels();

      const camFrom2 = camera.position.clone();
      const tFrom2 = controls.target.clone();
      const camTo2 = systemCamPosFor(newAnchor);
      const tTo2 = newAnchor.clone();

      // 第二段：横向飞向新锚点并展开新星系
      tween({
        dur: 1.0,
        onUpdate: (e) => {
          camera.position.lerpVectors(camFrom2, camTo2, e);
          controls.target.lerpVectors(tFrom2, tTo2, e);
          const s = e < 0.3 ? 0 : (e - 0.3) / 0.7;
          systemGroup.scale.setScalar(THREE.MathUtils.lerp(0.001, 1, Math.min(1, s)));
        },
        onDone: () => {
          controls.enabled = true;
          transitioning = false;
        },
      });
    },
  });
}

function exitSystem() {
  if (transitioning || mode !== 'system') return;
  transitioning = true;
  controls.enabled = false;
  backEl.classList.remove('show');
  navPrevEl.classList.remove('show');
  navNextEl.classList.remove('show');

  // 重新显示星系总览，让镜头一边后撤一边淡入
  galaxyGroup.visible = true;
  setGalaxyOpacity(0);
  sectionLabels.forEach(({ el }) => {
    el.style.opacity = '1';
    el.style.pointerEvents = '';
  });

  const startScale = systemGroup.scale.x;
  const camFrom = camera.position.clone();
  const camTo = GALAXY_CAM.clone();
  const tFrom = controls.target.clone();
  const tTo = new THREE.Vector3(0, 0, 0);

  tween({
    dur: 1.1,
    onUpdate: (e) => {
      camera.position.lerpVectors(camFrom, camTo, e);
      controls.target.lerpVectors(tFrom, tTo, e);
      const s = Math.min(1, e / 0.55);
      systemGroup.scale.setScalar(THREE.MathUtils.lerp(startScale, 0.001, s));
      // 星系背景从透明渐入
      setGalaxyOpacity(Math.min(1, Math.max(0, (e - 0.2) / 0.8)));
    },
    onDone: () => {
      setGalaxyOpacity(1);
      disposeSystem();
      systemGroup.visible = false;
      systemGroup.position.set(0, 0, 0);
      systemGroup.scale.setScalar(1);
      currentIdx = -1;
      mode = 'galaxy';
      controls.minDistance = 4;
      controls.maxDistance = 16;
      centerEl.classList.remove('hidden');
      hudEl.classList.remove('hidden');
      controls.enabled = true;
      transitioning = false;
    },
  });
}

// 给定子星系所在锚点，计算相机抵达后的位置：从原点向锚点的径向方向再外推一段
function systemCamPosFor(anchor) {
  const radial = new THREE.Vector3(anchor.x, 0, anchor.z);
  if (radial.lengthSq() < 1e-6) radial.set(0, 0, 1);
  radial.normalize();
  return anchor.clone()
    .add(radial.multiplyScalar(4.2))
    .add(new THREE.Vector3(0, 1.5, 0));
}

backEl.addEventListener('click', exitSystem);
navPrevEl.addEventListener('click', () => switchSystem(-1));
navNextEl.addEventListener('click', () => switchSystem(1));
addEventListener('keydown', (e) => {
  if (e.key === 'Escape') exitSystem();
  else if (e.key === 'ArrowLeft')  switchSystem(-1);
  else if (e.key === 'ArrowRight') switchSystem(1);
});

// -- post processing -------------------------------------------------------
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.85, 0.7, 0.05);
composer.addPass(bloom);

// -- resize ----------------------------------------------------------------
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
  labelRenderer.setSize(innerWidth, innerHeight);
});

// -- loop ------------------------------------------------------------------
const clock = new THREE.Clock();
let last = 0;
function tick() {
  const t = clock.getElapsedTime();
  const dt = t - last; last = t;

  ring.material.uniforms.uTime.value = t;
  disc.material.uniforms.uTime.value = t;

  // hover 强度在帧间平滑插值，避免跳变
  {
    const u = ring.material.uniforms;
    const k = 1 - Math.exp(-dt * 7);
    u.uHoverStrength.value += (targetHoverStrength - u.uHoverStrength.value) * k;
    if (targetHoverStrength > 0.01) u.uHoverSection.value = targetHoverSection;
    else if (u.uHoverStrength.value < 0.01) u.uHoverSection.value = -1;
  }

  if (activeSystem) {
    activeSystem.materials[0].uniforms.uTime.value = t;
    // 行星公转：在自己 orbitGroup 的 XY 局部平面内做圆周运动
    for (const p of activeSystem.planets) {
      p.angle += dt * p.speed;
      p.mesh.position.set(Math.cos(p.angle) * p.radius, Math.sin(p.angle) * p.radius, 0);
      p.mesh.rotation.y += dt * p.spin;
      p.material.uniforms.uStarPos.value.copy(systemGroup.position);
    }
    // halo 始终面向相机
    activeSystem.halo.lookAt(camera.position);
  }

  controls.update();
  composer.render();
  labelRenderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();
</script>
</body>
