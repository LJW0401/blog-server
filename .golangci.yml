version: "2"

run:
  timeout: 3m
  tests: true

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - gocyclo
  settings:
    gocyclo:
      # Wiring code (main, upload handlers with validation gates) naturally has
      # many short branches. 20 avoids fighting the lint on handler-heavy code.
      min-complexity: 20
