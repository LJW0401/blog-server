<!DOCTYPE html>
<html lang="zh-CN" class="{{ block "html_class" . }}{{ end }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ block "title" . }}Penguin{{ end }}</title>
  <meta name="description" content="{{ block "description" . }}个人开发者站点{{ end }}" />
  <link rel="stylesheet" href="/static/css/theme.css" />
  {{ block "head" . }}{{ end }}
</head>
<body class="{{ block "body_class" . }}{{ end }}">
{{ if .Banner }}
<div class="default-password-banner" role="alert">
  ⚠ 默认密码未修改，请尽快进入 <a href="/manage">管理后台</a> 修改密码。
</div>
{{ end }}

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">Penguin.</a>
    <ul class="nav-links">
      <li><a href="/">首页</a></li>
      <li><a href="/projects">项目</a></li>
      <li><a href="/docs">文档</a></li>
      <li><a href="/#contact">联系</a></li>
    </ul>
  </div>
</nav>

<main>
  {{ template "content" . }}
</main>

<footer class="footer" id="contact">
  <div class="footer-inner">
    <h4>保持联系。</h4>
    <table class="contact-table">
      <thead><tr><th>开源项目</th><th>媒体</th><th>交流群</th></tr></thead>
      <tbody>
        <tr>
          <td><ul><li>GitHub ›</li><li>Gitee ›</li></ul></td>
          <td><ul><li>B 站</li><li>抖音</li><li>小红书</li></ul></td>
          <td><ul><li>QQ：772436864</li></ul></td>
        </tr>
      </tbody>
    </table>
    <div class="copyright">© {{ formatDate .Now "2006" }} Penguin. Designed with care.</div>
  </div>
</footer>
</body>
</html>
