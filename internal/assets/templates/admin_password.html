{{ define "title" }}修改密码 — Penguin{{ end }}
{{ define "body_class" }}page-admin-login{{ end }}

{{ define "content" }}
{{ with .Data }}
<div class="admin-login-wrap">
  <form class="admin-card" method="POST" action="/manage/password">
    <h1>修改密码</h1>
    <p class="sub">新密码至少 8 位；保存后前台"默认密码"黄条会消失。</p>
    {{ if .Error }}<div class="form-err">{{ .Error }}</div>{{ end }}
    {{ if .Info }}<div class="form-info">{{ .Info }}</div>{{ end }}
    <input type="hidden" name="csrf" value="{{ .CSRF }}" />
    <label>
      <span>当前密码</span>
      <input type="password" name="old" autocomplete="current-password" required />
    </label>
    <label>
      <span>新密码</span>
      <input type="password" name="new" autocomplete="new-password" required minlength="8" />
    </label>
    <label>
      <span>确认新密码</span>
      <input type="password" name="confirm" autocomplete="new-password" required minlength="8" />
    </label>
    <div class="form-row">
      <a class="btn btn-ghost" href="/manage">取消</a>
      <button type="submit" class="btn btn-primary">保存</button>
    </div>
  </form>
</div>
{{ end }}
{{ end }}
