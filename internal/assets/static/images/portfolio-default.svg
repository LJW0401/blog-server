<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img" aria-label="Portfolio default cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1d2430" />
      <stop offset="1" stop-color="#2d3a56" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5aa7ff" />
      <stop offset="1" stop-color="#9f7aff" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#ffffff" fill-opacity="0.05" />
    </pattern>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" />
  <rect width="800" height="500" fill="url(#dots)" />
  <g transform="translate(400 250)">
    <circle r="130" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.7" />
    <circle r="85" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5" />
    <circle r="40" fill="url(#accent)" opacity="0.9" />
    <text x="0" y="6" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica Neue, Arial" font-size="28" font-weight="700" text-anchor="middle" fill="#ffffff" letter-spacing="3">P.</text>
  </g>
  <text x="400" y="440" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Helvetica Neue, Arial" font-size="14" text-anchor="middle" fill="#ffffff" fill-opacity="0.4" letter-spacing="6">PORTFOLIO</text>
</svg>
